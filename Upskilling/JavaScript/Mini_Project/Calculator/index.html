<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple calculator created with JavaScript.">
    <title>JavaScript Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="calculator">
        <h1>Calculator</h1>
        <output id="display" aria-live="polite">0</output>

        <div class="keys">
            <button class="utility" data-action="clear" type="button">C</button>
            <button class="utility" data-action="delete" type="button">DEL</button>
            <button class="operator" data-value="/" type="button">&divide;</button>
            <button class="operator" data-value="*" type="button">&times;</button>

            <button data-value="7" type="button">7</button>
            <button data-value="8" type="button">8</button>
            <button data-value="9" type="button">9</button>
            <button class="operator" data-value="-" type="button">&minus;</button>

            <button data-value="4" type="button">4</button>
            <button data-value="5" type="button">5</button>
            <button data-value="6" type="button">6</button>
            <button class="operator" data-value="+" type="button">+</button>

            <button data-value="1" type="button">1</button>
            <button data-value="2" type="button">2</button>
            <button data-value="3" type="button">3</button>
            <button class="equals" data-action="calculate" type="button">=</button>

            <button class="zero" data-value="0" type="button">0</button>
            <button data-value="." type="button">.</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
