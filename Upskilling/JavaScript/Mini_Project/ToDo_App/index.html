<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A to-do application created with JavaScript.">
    <title>JavaScript To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="todo-app">
        <h1>My Tasks</h1>

        <form id="taskForm">
            <label class="sr-only" for="taskInput">New task</label>
            <input id="taskInput" type="text" placeholder="What needs to be done?" required>
            <button type="submit">Add</button>
        </form>

        <p id="emptyMessage">No tasks yet. Add one above.</p>
        <ul id="taskList" aria-live="polite"></ul>
        <button class="clear-button" id="clearCompleted" type="button">Clear completed</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
