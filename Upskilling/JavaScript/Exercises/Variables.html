<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Variables</title>
</head>
<body>
    <h1>Variables</h1>
    <p id="output"></p>

    <script>
        const name = "Pramod";
        let age = 22;
        const isLearningJavaScript = true;

        document.getElementById("output").textContent =
            `${name} is ${age} years old. Learning JavaScript: ${isLearningJavaScript}`;
    </script>
</body>
</html>
