<!DOCTYPE html>
<html>
<head>

    <style>

        .card{
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            margin: 10px;
            box-shadow: 2px 2px 5px gray;
        }

        .card h2{
            font-size: 18px;
            color: #333;
        }

        .card p{
            color: #666;
        }

    </style>

</head>

<body>

    <div class="card">
        <h2>HTML5</h2>
        <p>Frontend structure</p>
    </div>

    <div class="card">
        <h2>CSS3</h2>
        <p>Styling and layout</p>
    </div>

</body>

</html>
