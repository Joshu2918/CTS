<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Name</th>
                <th scope="col">Course</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>101</td>
                <td>Pramod</td>
                <td>HTML5</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
